<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="100%" height="100%">
  <defs>
    <!-- Brand Gradient Dark Mode -->
    <linearGradient id="mipacto-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <filter id="shadow-dark" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#06B6D4" flood-opacity="0.35"/>
    </filter>
  </defs>
  
  <!-- Icon Mark -->
  <g transform="translate(8, 6)" filter="url(#shadow-dark)">
    <rect x="0" y="0" width="48" height="48" rx="12" fill="url(#mipacto-grad-dark)" />
    <!-- Document + Checkmark Icon -->
    <g transform="translate(10, 10)">
      <path d="M18 2.5H8c-1.4 0-2.5 1.1-2.5 2.5v22c0 1.4 1.1 2.5 2.5 2.5h12c1.4 0 2.5-1.1 2.5-2.5V8L18 2.5z" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
      <path d="M17.5 2.5v6.5h6.5" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
      <path d="m8.5 16 3 3 6.5-6.5" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    </g>
  </g>
  
  <!-- Text Wordmark (White + Gradient) -->
  <text x="68" y="34" font-family="'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="800" font-size="25" fill="#FFFFFF" letter-spacing="-0.5px">
    Mi <tspan fill="url(#mipacto-grad-dark)">Pacto</tspan>
  </text>
  
  <!-- Subtitle Tagline -->
  <text x="69" y="47" font-family="'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="700" font-size="8.5" fill="#94A3B8" letter-spacing="1.8px">
    CONTRATOS Y PAGOS
  </text>
</svg>
