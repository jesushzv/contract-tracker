    <g transform="translate(9, 9)">
      <path d="M15 2H6.5c-1 0-1.8.8-1.8 1.8v18.4c0 1 .8 1.8 1.8 1.8h11c1 0 1.8-.8 1.8-1.8V7L15 2z" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" fill="none" />
