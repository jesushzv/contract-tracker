<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 70" width="100%" height="100%">
  <defs>
    <linearGradient id="badge-grad-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6A1B9A" />
      <stop offset="100%" stop-color="#00ACC1" />
    </linearGradient>
    <filter id="badge-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>
  
  <!-- Outer Card Pill -->
  <rect x="2" y="2" width="256" height="66" rx="33" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#badge-shadow)" />
  
  <!-- Left Shield Icon Container -->
  <circle cx="35" cy="35" r="22" fill="url(#badge-grad-light)" />
  <!-- Shield + Check mark inside -->
  <g transform="translate(23, 23)">
    <path d="M12 2L4 5v6c0 5.5 3.8 10.7 8 12 4.2-1.3 8-6.5 8-12V5l-8-3z" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <path d="m8.5 11 2.5 2.5 4.5-4.5" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>
  
  <!-- Text Label -->
  <text x="68" y="28" font-family="'Nunito', sans-serif" font-weight="800" font-size="12" fill="#0F172A">
    FIRMADO &amp; SELLADO DIGITAMENTE
  </text>
  <text x="68" y="44" font-family="'Geist Mono', 'Fira Code', monospace" font-weight="600" font-size="10" fill="#00ACC1" letter-spacing="0.5px">
    SHA-256 VERIFIED • MI PACTO
  </text>
</svg>
