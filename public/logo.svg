<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="100%" height="100%">
  <defs>
    <!-- Purple-to-turquoise gradient -->
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
  </defs>
  
  <!-- Icon Mark (Document + Checkmark / Pact Concept) -->
  <g transform="translate(10, 5)">
    <!-- Rounded background for the mark -->
    <rect x="0" y="0" width="40" height="40" rx="10" fill="url(#logo-grad)" />
    <!-- Document + Checkmark SVG inside -->
    <g transform="translate(8, 8)">
      <path d="M14 2H6c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
      <path d="M14 2v6h6" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
      <path d="m6 13 2 2 4-4" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    </g>
  </g>
  
  <!-- Text Wordmark -->
  <text x="62" y="32" font-family="'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="800" font-size="22" fill="#0f172a" letter-spacing="-0.5px">
    Mi <tspan fill="url(#logo-grad)">Pacto</tspan>
  </text>
</svg>
